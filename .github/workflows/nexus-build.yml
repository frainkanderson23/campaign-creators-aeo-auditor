name: Nexus Build Agent
on:
  issue_comment:
    types: [created]
permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
jobs:
  nexus-build:
    if: contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT_TOKEN }}
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--dangerously-skip-permissions --max-turns 60"
          github_token: ${{ secrets.GH_PAT_TOKEN }}
      - name: Auto-create and merge PR
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_TOKEN }}
        run: |
          ISSUE_NUM=${{ github.event.issue.number }}
          TITLE=$(echo '${{ github.event.issue.title }}' | sed 's/NEXUS BUILD: //')
          CLAUDE_BRANCH=""
          for ATTEMPT in 1 2 3; do
            CLAUDE_BRANCH=$(gh api "repos/${{ github.repository }}/git/matching-refs/heads/claude/issue-${ISSUE_NUM}-" --jq '.[].ref' 2>/dev/null | sed 's|refs/heads/||' | sort -r | head -1)
            if [ -n "$CLAUDE_BRANCH" ]; then
              break
            fi
            echo "Attempt ${ATTEMPT}: no branch found, waiting 10s..."
            sleep 10
          done
          echo "Found branch: ${CLAUDE_BRANCH:-none}"
          if [ -n "$CLAUDE_BRANCH" ]; then
            echo "Creating PR for branch: $CLAUDE_BRANCH"
            PR_URL=$(gh pr create \
              --repo "${{ github.repository }}" \
              --base main \
              --head "$CLAUDE_BRANCH" \
              --title "feat(nexus): $TITLE" \
              --body "Automated cloud build from issue #${ISSUE_NUM}
          Closes #${ISSUE_NUM}
          Generated by Nexus Hub — claude-code-action" \
              2>&1) || true
            if echo "$PR_URL" | grep -q "already exists"; then
              PR_URL=$(gh pr list --repo "${{ github.repository }}" --head "$CLAUDE_BRANCH" --json url --jq '.[0].url')
            fi
            if [ -n "$PR_URL" ] && echo "$PR_URL" | grep -q "github.com"; then
              echo "Merging PR: $PR_URL"
              sleep 10
              gh pr merge "$PR_URL" --squash --auto --delete-branch \
                || echo "Auto-merge enabled or merge failed -- PR may need manual review"
            fi
          else
            echo "No Claude branch found for issue #${ISSUE_NUM} after 3 attempts"
          fi
